<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CERMS 3D Viewer</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:rgba(12,18,32,.72);
      --panel-border:rgba(255,255,255,.10);
      --text:#eaf0ff;
      --muted:#a9b5d1;
      --accent:#5aa9ff;
      --accent-2:#7ce3c3;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(circle at top left, rgba(90,169,255,.16), transparent 28%),
        radial-gradient(circle at top right, rgba(124,227,195,.10), transparent 24%),
        linear-gradient(180deg, #0a1120 0%, #0b1220 100%);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
    }

    #viewer{
      position:fixed;
      inset:0;
    }

    .topbar{
      position:fixed;
      top:18px;
      left:18px;
      right:18px;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      z-index:20;
      pointer-events:none;
    }

    .brand,
    .help,
    .status{
      background:var(--panel);
      border:1px solid var(--panel-border);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      box-shadow:0 10px 30px rgba(0,0,0,.25);
      border-radius:14px;
    }

    .brand{
      padding:14px 16px;
      min-width:280px;
    }

    .brand-title{
      font-size:24px;
      font-weight:700;
      letter-spacing:.2px;
      margin:0 0 4px 0;
    }

    .brand-sub{
      font-size:13px;
      color:var(--muted);
      margin:0;
    }

    .help{
      padding:12px 14px;
      max-width:320px;
      pointer-events:auto;
    }

    .help-title{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--accent-2);
      margin:0 0 8px 0;
      font-weight:700;
    }

    .help-text{
      margin:0;
      font-size:13px;
      line-height:1.45;
      color:var(--muted);
    }

    .status{
      position:fixed;
      left:18px;
      bottom:18px;
      z-index:20;
      padding:10px 12px;
      font-size:13px;
      color:var(--text);
      min-width:220px;
      pointer-events:none;
    }

    .status strong{
      color:#fff;
    }

    .legend-dot{
      display:inline-block;
      width:9px;
      height:9px;
      border-radius:50%;
      background:linear-gradient(180deg,var(--accent),var(--accent-2));
      margin-right:8px;
      vertical-align:middle;
      box-shadow:0 0 14px rgba(90,169,255,.55);
    }

    canvas{display:block}
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="viewer"></div>

  <div class="topbar">
    <div class="brand">
      <h1 class="brand-title">CERMS 3D Viewer</h1>
      <p class="brand-sub">Interactive coastal model visualisation</p>
    </div>

    <div class="help">
      <p class="help-title">Controls</p>
      <p class="help-text">
        Left drag to rotate<br>
        Right drag to pan<br>
        Mouse wheel to zoom
      </p>
    </div>
  </div>

  <div class="status" id="status">
    <span class="legend-dot"></span><strong>Loading model…</strong>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const viewer = document.getElementById('viewer');
    const status = document.getElementById('status');
    let currentModel = null;
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
    let measurePoints = [];
let measureMarkers = [];
let measureLine = null;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1220);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100000);
    camera.position.set(10, 10, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    viewer.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.screenSpacePanning = true;
    controls.minDistance = 1;

    scene.add(new THREE.AmbientLight(0xffffff, 1.35));

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(120, 100, 80);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0x9fc7ff, 0.55);
    fillLight.position.set(-80, 40, -60);
    scene.add(fillLight);

    const loader = new GLTFLoader();

    loader.load(
      'https://pub-2d755f56a3cb4c47af31c44e310ef006.r2.dev/model.glb',
      function (gltf) {
        const model = gltf.scene;
        currentModel = model;
        scene.add(model);

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z) || 1;

        const originalCenter = center.clone();
        model.userData.originalCenter = originalCenter;

        model.position.sub(center);

        const distance = maxDim * 2.3;
        camera.position.set(distance, distance * 0.9, distance * 0.7);
        camera.near = Math.max(maxDim / 1000, 0.1);
        camera.far = Math.max(maxDim * 100, 1000);
        camera.updateProjectionMatrix();

        controls.target.set(0, 0, 0);
        controls.update();

        status.innerHTML = '<span class="legend-dot"></span><strong>Model loaded</strong>';
      },
      function (xhr) {
        if (xhr.total) {
          const percent = (xhr.loaded / xhr.total) * 100;
          status.innerHTML = '<span class="legend-dot"></span><strong>Loading model… ' + percent.toFixed(0) + '%</strong>';
        }
      },
      function (error) {
        console.error(error);
        status.innerHTML = '<span class="legend-dot"></span><strong>Error loading model</strong>';
      }
    );
    window.addEventListener('click', (event) => {
  if (!currentModel) return;

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const hits = raycaster.intersectObject(currentModel, true);

  if (hits.length > 0) {
    const p = hits[0].point;
    if (measurePoints.length === 2) {
  measurePoints = [];
  measureMarkers.forEach(marker => scene.remove(marker));
  measureMarkers = [];
  if (measureLine) {
    scene.remove(measureLine);
    measureLine = null;
  }
}

measurePoints.push(p.clone());

const markerGeometry = new THREE.SphereGeometry(0.5, 16, 16);
const markerMaterial = new THREE.MeshBasicMaterial({ color: 0x5aa9ff });
const marker = new THREE.Mesh(markerGeometry, markerMaterial);
marker.position.copy(p);
scene.add(marker);
measureMarkers.push(marker);

if (measurePoints.length === 2) {
  const lineGeometry = new THREE.BufferGeometry().setFromPoints(measurePoints);
  const lineMaterial = new THREE.LineBasicMaterial({ color: 0x7ce3c3 });
  measureLine = new THREE.Line(lineGeometry, lineMaterial);
  scene.add(measureLine);

  const distance = measurePoints[0].distanceTo(measurePoints[1]);

  status.innerHTML =
    '<span class="legend-dot"></span><strong>Distance:</strong> ' +
    distance.toFixed(3) + ' units';
}
const offset = currentModel.userData.originalCenter || { x: 0, y: 0, z: 0 };

const realX = p.x + offset.x;
const realY = p.y + offset.y;
const realZ = p.z + offset.z;

status.innerHTML =
  '<span class="legend-dot"></span><strong>X:</strong> ' + realX.toFixed(3) +
  ' <strong>Y:</strong> ' + realY.toFixed(3) +
  ' <strong>Z:</strong> ' + realZ.toFixed(3);
  }
});
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
