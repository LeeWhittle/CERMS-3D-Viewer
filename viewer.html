<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CERMS 3D Viewer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: Arial, sans-serif;
      background: rgba(0,0,0,0.55);
      padding: 8px 10px;
      border-radius: 6px;
      z-index: 10;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="info">Loading model...</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const info = document.getElementById('info');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100000);
    camera.position.set(10, 10, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(100, 100, 100);
    scene.add(dirLight);

    const loader = new GLTFLoader();

    loader.load(
      'https://pub-2d755f56a3cb4c47af31c44e310ef006.r2.dev/model.glb',
      function (gltf) {
        const model = gltf.scene;
        scene.add(model);

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z) || 1;

        model.position.sub(center);

        const distance = maxDim * 2.5;
        camera.position.set(distance, distance, distance);
        camera.near = Math.max(maxDim / 1000, 0.1);
        camera.far = Math.max(maxDim * 100, 1000);
        camera.updateProjectionMatrix();

        controls.target.set(0, 0, 0);
        controls.update();

        info.textContent = 'CERMS 3D Viewer';
      },
      function (xhr) {
        if (xhr.total) {
          const percent = (xhr.loaded / xhr.total) * 100;
          info.textContent = 'Loading model... ' + percent.toFixed(0) + '%';
        }
      },
      function (error) {
        console.error(error);
        info.textContent = 'Error loading model.glb';
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
